<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1 class="app-title">📋 我的待办清单</h1>

            <div class="input-section">
                <input
                    type="text"
                    id="todoInput"
                    class="todo-input"
                    placeholder="今天要做什么？"
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">➕ 添加任务</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">未完成</span>
                    <span id="pendingCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">已完成</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div id="clearCompletedSection" class="clear-completed-section" style="display: none;">
                <button id="clearCompletedBtn" class="clear-completed-btn">清空已完成</button>
            </div>

            <div id="emptyState" class="empty-state">
                <p>还没有任务，开始添加吧！</p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
